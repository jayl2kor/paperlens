services:
  backend:
    build: ./backend
    ports:
      - "8081:8081"
    volumes:
      - paper_uploads:/app/uploads
      - paper_db:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - BACKEND_URL=http://backend:8081
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paper_uploads:
  paper_db:
