name: paperlens

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8001"
    volumes:
      - paperlens_uploads:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - BACKEND_URL=http://backend:8001
    expose:
      - "3000"
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paperlens_uploads:
  caddy_data:
  caddy_config:
